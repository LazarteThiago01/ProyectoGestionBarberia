<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Turnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Turnos Programados</h2>
    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Email</th>
                <th>Peluquero</th>
                <th>Fecha/Hora</th>
            </tr>
        </thead>
        <tbody>
            {% for t in lista_turnos %}
            <tr>
                <td>{{ t.nombre }}</td>
                <td>{{ t.email }}</td>
                <td>{{ t.peluquero }}</td>
                <td>{{ t.fecha }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Volver a Reservar</a>
</body>
</html>
