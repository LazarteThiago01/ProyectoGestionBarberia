<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Barbería Grupo 12</title>
    <!-- Esto es Bootstrap para que se vea lindo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Reserva tu Turno</h1>
        <div class="card shadow p-4">
            <form action="/reservar" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Elegí tu Peluquero</label>
                    <select name="peluquero" class="form-select">
                        <option value="1">Thiago (Corte Clásico)</option>
                        <option value="2">Martin (Barba y Estilo)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Fecha y Hora</label>
                    <input type="datetime-local" name="fecha" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Reservar Turno</button>
            </form>
        </div>
    </div>
</body>
</html>
