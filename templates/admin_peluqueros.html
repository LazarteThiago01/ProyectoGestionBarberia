<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>Gestionar Peluqueros</h1>
    
    <form action="/admin/agregar_peluquero" method="POST" class="mb-4">
        <input type="text" name="nombre" placeholder="Nombre del peluquero" required>
        <button type="submit" class="btn btn-success">Agregar</button>
    </form>

    <table class="table">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            {% for p in peluqueros %}
            <tr>
                <td>{{ p.nombre }}</td>
                <td><a href="/admin/eliminar_peluquero/{{ p.id }}" class="btn btn-danger btn-sm">Eliminar</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/">Ir a la web pública</a>
</body>
</html>
